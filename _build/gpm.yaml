name: formitwebhook
version: 1.1.0-pl
lowCaseName: formitwebhook
namespace: formit-webhook
description: FormIt Webhook - send your form data to any URL

systemSettings:
  - key: core_path
  - key: webhook_bearer_token
    type: textfield
    area: default
  - key: webhook_url
    type: textfield
    area: default
  - key: webhook_method
    type: textfield
    area: default
    value: POST
  - key: webhook_static_data
    type: textfield
    area: default
    value:
  - key: webhook_field_mapping
    type: textfield
    area: default
    value:
snippets:
  - name: FormitWebhook
    file: formitwebhook.snippet.php
build:
  readme: README.md
  license: core/components/formitwebhook/docs/license.txt
  changelog: core/components/formitwebhook/docs/changelog.txt
  requires:
    php: '>=7.3'
    modx: '>=2.8'
    FormIt: '>=3.2'
